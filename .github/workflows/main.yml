name: "Cloud PC Setup (Windows / macOS)"

on:
  workflow_dispatch:
    inputs:
      os_choice:
        description: "Select the Operating System to deploy"
        type: choice
        options:
          - Windows
          - macOS
        required: true
        default: Windows
      CODE:
        description: "[Windows] Full headless CRD command (CMD version)"
        required: false
        default: ""
      PIN:
        description: "[Windows] CRD PIN (6+ digits)"
        required: false
        default: "123456"
      RUSTDESK_PASSWORD:
        description: "[macOS] Custom RustDesk password (Persistent)"
        required: false
        default: "password123"

concurrency:
  group: cloud-pc-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  # ==========================================
  # WINDOWS JOB
  # ==========================================
  windows-crd-setup:
    name: "🚀 Windows 2022 CRD Runner"
    if: github.event.inputs.os_choice == 'Windows'
    runs-on: windows-2022
    steps:
      - name: "🔊 Enable Audio"
        shell: pwsh
        run: |
          Set-Service -Name Audiosrv -StartupType Automatic
          Start-Service -Name Audiosrv

      - name: "🔧 Install CRD & Virtual Audio"
        shell: pwsh
        run: |
          $userDownloads = Join-Path $env:USERPROFILE 'Downloads'
          if (-not (Test-Path $userDownloads)) { New-Item -ItemType Directory -Path $userDownloads | Out-Null }
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "$userDownloads\crdhost.msi" -UseBasicParsing
          Start-Process -Wait -FilePath "msiexec.exe" -ArgumentList "/i `"$userDownloads\crdhost.msi`" /qn /norestart"

      - name: "🕵️‍♂️ Silent Install & Launch MostLogin"
        shell: pwsh
        run: |
          $mlInstaller = "$env:USERPROFILE\Downloads\MostLogin-setup.exe"
          Invoke-WebRequest -Uri "https://downsoft.mostlogin.com/MostLogin-setup.exe" -OutFile $mlInstaller -UseBasicParsing
          Start-Process -FilePath $mlInstaller -ArgumentList "/S" -Wait
          Start-Process -FilePath "C:\Program Files (x86)\MostLogin\MostLogin.exe" || true

      - name: "🌟 Start Chrome Remote Desktop"
        shell: cmd
        run: ${{ github.event.inputs.CODE }} --pin=${{ github.event.inputs.PIN }}

      - name: "⏳ Keep Alive"
        shell: pwsh
        run: while ($true) { Start-Sleep -Seconds 300 }

  # ==========================================
  # MACOS JOB (Full OTP & ID Live Monitoring)
  # ==========================================
  macos-rustdesk-setup:
    name: "🍏 macOS RustDesk Runner"
    if: github.event.inputs.os_choice == 'macOS'
    runs-on: macos-15

    steps:
      - name: "🔓 Create Admin"
        run: sudo sysadminctl -addUser macadmin -fullName "Mac Admin" -password "${{ github.event.inputs.RUSTDESK_PASSWORD }}" -admin

      - name: "🚫 System Prep"
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          curl -L -o /Users/runner/wallpaper.jpg "https://images.unsplash.com/photo-1506744626753-dba37c2a9816?q=80&w=2560"
          osascript -e 'tell application "Finder" to set desktop picture to POSIX file "/Users/runner/wallpaper.jpg"'

      - name: "🖥️ Install Remote Tools"
        run: |
          brew install --cask rustdesk
          curl -L -o /tmp/crd.dmg https://dl.google.com/chrome-remote-desktop/chromeremotedesktop.dmg
          sudo hdiutil attach /tmp/crd.dmg -nobrowse
          PKG_PATH=$(find "/Volumes/Chrome Remote Desktop Host"* -name "*.pkg" | head -n 1)
          sudo installer -pkg "$PKG_PATH" -target /
          sudo hdiutil detach "/Volumes/Chrome Remote Desktop Host"* -force

      - name: "🕵️‍♂️ Install Browsers"
        run: |
          curl -L -o /tmp/mostlogin.dmg "https://downsoft.mostlogin.com/MostLogin-x64-setup.dmg"
          sudo hdiutil attach /tmp/mostlogin.dmg -nobrowse
          sudo cp -R /Volumes/MostLogin*/*.app /Applications/
          sudo hdiutil detach /Volumes/MostLogin* -force

      - name: "💉 TCC Permissions Injection"
        run: |
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          for SERVICE in kTCCServiceAccessibility kTCCServiceScreenCapture kTCCServicePostEvent; do
            sudo sqlite3 "$TCC_DB" "INSERT OR REPLACE INTO access VALUES('$SERVICE','com.carriez.RustDesk',0,2,4,1,NULL,NULL,0,'UNUSED',NULL,0,0,0,0,0,$(date +%s));"
          done

      - name: "🚀 Launch & Live Monitor OTP (3s Loop)"
        run: |
          # Start the GUI
          open /Applications/RustDesk.app
          sleep 20
          
          echo "🔎 Monitoring LIVE One-Time Password every 3 seconds..."
          echo "Check the logs below for your connection details."

          while true; do
            # Get the current ID
            RS_ID=$(/Applications/RustDesk.app/Contents/MacOS/rustdesk --get-id 2>/dev/null)
            
            # Get the ACTUAL One-Time Password shown in the UI
            RS_OTP=$(/Applications/RustDesk.app/Contents/MacOS/rustdesk --get-password 2>/dev/null)

            echo "----------------------------"
            echo "TIME: $(date +%H:%M:%S)"
            echo "ID  : $RS_ID"
            echo "OTP : $RS_OTP"
            echo "----------------------------"
            
            sleep 3
          done
