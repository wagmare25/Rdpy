name: "Cloud PC Setup (Windows / macOS)"

on:
  workflow_dispatch:
    inputs:
      os_choice:
        description: "Select the Operating System to deploy"
        type: choice
        options:
          - Windows
          - macOS
        required: true
        default: Windows
      
      windows_runner:
        description: "[Windows] Select Runner Model"
        type: choice
        options:
          - windows-latest
          - windows-2025
          - windows-2022
          - windows-2019
        required: false
        default: windows-2022
      
      macos_runner:
        description: "[macOS] Select Runner Model"
        type: choice
        options:
          - macos-latest
          - macos-15
          - macos-14
          - macos-13
          - macos-12
        required: false
        default: macos-13
      
      CODE:
        description: "[Windows] Full headless CRD command (CMD version)"
        required: false
        default: ""
      
      PIN:
        description: "[Windows] CRD PIN (6+ digits)"
        required: false
        default: "123456"
      
      RUSTDESK_PASSWORD:
        description: "[macOS] Custom RustDesk password"
        required: false
        default: "password123"

concurrency:
  group: cloud-pc-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  # ==========================================
  # WINDOWS JOB
  # ==========================================
  windows-crd-setup:
    name: "🚀 Windows CRD Runner"
    if: github.event.inputs.os_choice == 'Windows'
    runs-on: ${{ github.event.inputs.windows_runner }}
    timeout-minutes: 360

    env:
      RAW_CODE: ${{ github.event.inputs.CODE }}
      PIN_INPUT: ${{ github.event.inputs.PIN }}

    defaults:
      run:
        shell: pwsh

    steps:
      - name: "📋 Display Runner Info"
        run: |
          Write-Host "🖥️  Runner: ${{ github.event.inputs.windows_runner }}"
          Write-Host "💻 OS: Windows"

      - name: "🔒 Mask Sensitive Inputs"
        run: |
          echo "::add-mask::${{ github.event.inputs.CODE }}"
          echo "::add-mask::${{ github.event.inputs.PIN }}"

      - name: "🛑 Verify Inputs"
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RAW_CODE)) {
            Write-Error "❌ CRD code is required for Windows."
            exit 1
          }

      - name: "🔊 Enable Audio & Install Software"
        run: |
          Set-Service -Name Audiosrv -StartupType Automatic
          Start-Service -Name Audiosrv
          $userDownloads = Join-Path $env:USERPROFILE 'Downloads'
          if (-not (Test-Path $userDownloads)) { New-Item -ItemType Directory -Path $userDownloads }
          
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "$userDownloads\crdhost.msi"
          Start-Process -Wait -FilePath "msiexec.exe" -ArgumentList "/i `"$userDownloads\crdhost.msi`" /qn /norestart"
          
          Invoke-WebRequest -Uri "https://downsoft.mostlogin.com/MostLogin-x64-setup.exe" -OutFile "$userDownloads\MostLogin.exe"
          Start-Process -Wait -FilePath "$userDownloads\MostLogin.exe" -ArgumentList "/S", "/SILENT"

      - name: "🌟 Start Chrome Remote Desktop"
        run: |
          $crdCommand = "$env:RAW_CODE --pin=$env:PIN_INPUT"
          cmd.exe /c $crdCommand
          Write-Host "✅ Windows CRD Online!"

      - name: "⏳ Keep Runner Alive"
        run: |
          while ($true) { Start-Sleep -Seconds 300 }

  # ==========================================
  # MACOS JOB
  # ==========================================
  macos-rustdesk-setup:
    name: "🍏 macOS RustDesk Runner"
    if: github.event.inputs.os_choice == 'macOS'
    runs-on: ${{ github.event.inputs.macos_runner }}
    timeout-minutes: 360

    steps:
      - name: "📋 Display Runner Info"
        run: |
          echo "🖥️  Runner: ${{ github.event.inputs.macos_runner }}"
          echo "💻 OS: macOS"

      - name: "🔒 Mask Sensitive Inputs"
        run: |
          echo "::add-mask::${{ github.event.inputs.RUSTDESK_PASSWORD }}"

      - name: "🛡️ NUCLEAR BYPASS: Disable Admin Prompts"
        run: |
          # 1. Disable Gatekeeper
          sudo spctl --master-disable
          
          # 2. Overwrite Authorization DB for Software Installation & CRD Helpers
          # This specifically targets the "Anka" / Admin password prompt
          sudo security authorizationdb write system.install.software allow
          sudo security authorizationdb write system.install.apple-software allow
          sudo security authorizationdb write system.services.systemcomponents.install allow
          sudo security authorizationdb write com.google.ChromeRemoteDesktop.host.me2me allow
          sudo security authorizationdb write com.google.chrome.remote_desktop.helper allow
          
          # 3. Pre-create directories and force permissions
          sudo mkdir -p "/Library/Google/Chrome Remote Desktop"
          sudo mkdir -p "/Library/PrivilegedHelperTools"
          sudo chmod -R 777 "/Library/Google/Chrome Remote Desktop"
          sudo chmod 777 "/Library/PrivilegedHelperTools"
          
          echo "✅ Security bypasses injected."

      - name: "🔓 Setup Admin Account"
        run: |
          sudo sysadminctl -addUser macadmin -fullName "Mac Admin" -password "${{ github.event.inputs.RUSTDESK_PASSWORD }}" -admin
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0

      - name: "🦀 Install Remote Desktop Apps"
        run: |
          brew install --cask --no-quarantine rustdesk
          curl -L -o /tmp/crd.dmg https://dl.google.com/chrome-remote-desktop/chromeremotedesktop.dmg
          sudo hdiutil attach /tmp/crd.dmg -nobrowse
          PKG_PATH=$(find /Volumes/Chrome\ Remote\ Desktop* -name "*.pkg" | head -n 1)
          sudo installer -pkg "$PKG_PATH" -target /
          sudo hdiutil detach /Volumes/Chrome\ Remote\ Desktop* -force
          echo "✅ Apps installed without prompt."

      - name: "🔓 Inject Permissions into TCC.db"
        run: |
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          SQL_QUERY="
            INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', 'com.carriez.rustdesk', 0, 2, 4, 1, 0);
            INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', 'com.carriez.rustdesk', 0, 2, 4, 1, 0);
            INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', 'com.google.ChromeRemoteDesktop.host.me2me', 0, 2, 4, 1, 0);
            INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', 'com.google.ChromeRemoteDesktop.host.me2me', 0, 2, 4, 1, 0);
          "
          sudo sqlite3 "$TCC_DB" "$SQL_QUERY"

      - name: "🖥️ Virtual Monitor & Anti-Detect Browsers"
        run: |
          brew install --cask betterdisplay
          open /Applications/BetterDisplay.app
          
          # MostLogin install
          curl -L -o /tmp/mostlogin.dmg "https://downsoft.mostlogin.com/MostLogin-x64-setup.dmg"
          MOUNT_DIR=$(sudo hdiutil attach /tmp/mostlogin.dmg -nobrowse | grep -o '/Volumes/.*')
          sudo cp -R "$MOUNT_DIR"/*.app /Applications/
          sudo hdiutil detach "$MOUNT_DIR" -force

      - name: "🚀 Start RustDesk"
        run: |
          open /Applications/RustDesk.app
          sleep 10
          sudo /Applications/RustDesk.app/Contents/MacOS/rustdesk --password "${{ github.event.inputs.RUSTDESK_PASSWORD }}"
          sudo caffeinate -dimsu &

      - name: "📸 Capture ID & Keep Alive"
        run: |
          sleep 15
          screencapture -x /tmp/rustdesk-id.png
          curl -s -F "reqtype=fileupload" -F "fileToUpload=@/tmp/rustdesk-id.png" https://catbox.moe/user/api.php
          echo "🚀 STATUS: READY TO CONNECT!"
          while true; do sleep 3600; done
