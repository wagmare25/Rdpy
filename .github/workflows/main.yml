name: "macOS RustDesk - File-Based ID & PW"

on:
  workflow_dispatch:
    inputs:
      RUSTDESK_PASSWORD:
        description: "Set a custom fixed password (optional)"
        default: "password123"
        required: true

jobs:
  rustdesk:
    name: "🦀 Config Extraction"
    runs-on: macos-15

    steps:
      - name: "🦀 Install RustDesk"
        run: |
          brew install --cask rustdesk
          echo "✅ RustDesk installed"

      - name: "🔓 Grant Permissions"
        run: |
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          RUSTDESK="com.carriez.rustdesk"
          SQL_QUERY="INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', '$RUSTDESK', 0, 2, 4, 1, 0); INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', '$RUSTDESK', 0, 2, 4, 1, 0);"
          sudo sqlite3 "$TCC_DB" "$SQL_QUERY"
          sudo killall -9 tccd || true

      - name: "🚀 Start RustDesk"
        run: |
          RUSTDESK_APP=$(find /Applications -name "RustDesk.app" -type d | head -1)
          open "$RUSTDESK_APP"
          # We set your fixed password, but the one-time one will still exist
          "$RUSTDESK_APP/Contents/MacOS/rustdesk" --password "${{ github.event.inputs.RUSTDESK_PASSWORD }}"
          echo "✅ RustDesk started"

      - name: "🔄 Extraction & Monitoring Loop"
        run: |
          # Function to find and print credentials from the config file
          show_creds() {
            CONF="$HOME/Library/Application Support/RustDesk/config/client.toml"
            
            if [ -f "$CONF" ]; then
              # Extract ID
              ID=$(grep "id =" "$CONF" | cut -d"'" -f2)
              # Extract the One-Time Password
              # Note: If it's encrypted, this might show the hash, but usually 
              # on fresh installs, it stores the current session PW clearly.
              OTP=$(grep "password =" "$CONF" | cut -d"'" -f2)
              
              echo "------------------------------------------------------"
              echo "⏰ UPDATE: $(date)"
              echo "🆔 REMOTE ID: $ID"
              echo "🎲 ONE-TIME PASSWORD: $OTP"
              echo "🔑 FIXED PASSWORD:    ${{ github.event.inputs.RUSTDESK_PASSWORD }}"
              echo "------------------------------------------------------"
            else
              echo "⏳ Waiting for config file to be generated..."
            fi
          }

          echo "🚀 MONITORING STARTED..."
          sleep 30
          show_creds

          PREVIOUS_STATE="off"
          while true; do
            # Check for active connection
            CONN_COUNT=$(netstat -an | grep ESTABLISHED | grep -Ei "\.21116|\.21117" | wc -l)

            if [ "$CONN_COUNT" -gt 0 ]; then
                if [ "$PREVIOUS_STATE" == "off" ]; then
                    echo "🌐 User connected."
                    PREVIOUS_STATE="on"
                fi
            else
                if [ "$PREVIOUS_STATE" == "on" ]; then
                    echo "⚠️ Disconnected. Refreshing credentials from file..."
                    # Force a refresh of the GUI to trigger a new password if needed
                    open -a "RustDesk"
                    sleep 10
                    show_creds
                    PREVIOUS_STATE="off"
                fi
            fi
            sleep 15
          done
