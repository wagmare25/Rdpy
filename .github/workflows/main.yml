```yaml
name: "Cloud PC Setup (Windows / macOS)"

on:
  workflow_dispatch:
    inputs:

      os_choice:
        description: "Select the Operating System to deploy"
        type: choice
        options:
          - Windows
          - macOS
        required: true
        default: Windows

      windows_runner:
        description: "[Windows] Select Runner Model"
        type: choice
        options:
          - windows-latest
          - windows-2025
          - windows-2022
          - windows-2019
        required: false
        default: windows-2022

      macos_runner:
        description: "[macOS] Select Runner Model"
        type: choice
        options:
          - macos-latest
          - macos-15
          - macos-14
          - macos-13
          - macos-12
        required: false
        default: macos-14

      CODE:
        description: "[Windows] Full headless CRD command (CMD version)"
        required: false
        default: ""

      PIN:
        description: "[Windows] CRD PIN (6+ digits)"
        required: false
        default: "123456"

      RUSTDESK_PASSWORD:
        description: "[macOS] Custom RustDesk password"
        required: false
        default: "password123"


concurrency:
  group: cloud-pc-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false


jobs:

########################################
# WINDOWS CLOUD PC
########################################

  windows-crd-setup:

    name: "🚀 Windows CRD Runner"

    if: github.event.inputs.os_choice == 'Windows'

    runs-on: ${{ github.event.inputs.windows_runner }}

    env:
      RAW_CODE: ${{ github.event.inputs.CODE }}
      PIN_INPUT: ${{ github.event.inputs.PIN }}

    defaults:
      run:
        shell: pwsh

    steps:

      - name: Display Runner Info
        run: |
          Write-Host "Runner: ${{ github.event.inputs.windows_runner }}"
          Write-Host "Operating System: Windows"

      - name: Verify Inputs
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RAW_CODE)) {
            Write-Error "CRD CODE required"
            exit 1
          }

      - name: Enable Windows Audio
        run: |
          Set-Service -Name Audiosrv -StartupType Automatic
          Start-Service -Name Audiosrv

      - name: Install Chrome Remote Desktop
        run: |
          Invoke-WebRequest https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi -OutFile crdhost.msi
          Start-Process msiexec.exe -Wait -ArgumentList "/i crdhost.msi /qn /norestart"

      - name: Install Virtual Audio Cable
        run: |
          Invoke-WebRequest https://download.vb-audio.com/Download_CABLE/VBCABLE_Driver_Pack45.zip -OutFile vbcable.zip
          Expand-Archive vbcable.zip
          Start-Process -Wait VBCABLE*/VBCABLE_Setup_x64.exe -ArgumentList "-i","-h" -Verb RunAs

      - name: Start Chrome Remote Desktop
        run: |
          cmd.exe /c "$env:RAW_CODE --pin=$env:PIN_INPUT"

      - name: Download GoLogin
        run: |
          Invoke-WebRequest https://dl.gologin.com/gologin.exe -OutFile gologin.exe

      - name: Keep Runner Alive
        run: |
          Write-Host "Cloud PC Ready"
          while ($true) {
            Start-Sleep 300
          }



########################################
# MACOS CLOUD PC
########################################

  macos-rustdesk-setup:

    name: "🍏 macOS RustDesk Runner"

    if: github.event.inputs.os_choice == 'macOS'

    runs-on: ${{ github.event.inputs.macos_runner }}

    steps:

      - name: Display Runner Info
        run: |
          echo "Runner: ${{ github.event.inputs.macos_runner }}"
          echo "Operating System: macOS"

      - name: Create Admin User
        run: |
          sudo sysadminctl -addUser macadmin \
          -fullName "Mac Admin" \
          -password "${{ github.event.inputs.RUSTDESK_PASSWORD }}" \
          -admin

      - name: Disable Sleep
        run: |
          sudo pmset -a sleep 0
          sudo pmset -a displaysleep 0
          sudo pmset -a disksleep 0

      - name: Install RustDesk
        run: |
          brew install --cask --no-quarantine rustdesk

      - name: Install Chrome Remote Desktop
        run: |
          curl -L -o /tmp/crd.dmg https://dl.google.com/chrome-remote-desktop/chromeremotedesktop.dmg
          sudo hdiutil attach /tmp/crd.dmg -nobrowse
          PKG_PATH=$(find /Volumes/Chrome\ Remote\ Desktop* -name "*.pkg" | head -n 1)
          sudo installer -pkg "$PKG_PATH" -target /
          sudo hdiutil detach /Volumes/Chrome\ Remote\ Desktop* -force

      - name: Install MostLogin
        run: |
          curl -L -o /tmp/mostlogin.dmg https://downsoft.mostlogin.com/MostLogin-x64-setup.dmg
          MOUNT=$(hdiutil attach /tmp/mostlogin.dmg -nobrowse | grep Volumes | awk '{print $3}')
          cp -R "$MOUNT"/*.app /Applications/
          hdiutil detach "$MOUNT" -force

      - name: Install GoLogin
        run: |
          curl -L -o /tmp/gologin.dmg https://dl.gologin.com/gologin-arm64.dmg
          MOUNT=$(hdiutil attach /tmp/gologin.dmg -nobrowse | grep Volumes | awk '{print $3}')
          cp -R "$MOUNT"/*.app /Applications/
          hdiutil detach "$MOUNT" -force

      - name: Start RustDesk
        run: |
          RUSTDESK=$(find /Applications -name RustDesk.app | head -1)
          open "$RUSTDESK"
          "$RUSTDESK/Contents/MacOS/rustdesk" --password "${{ github.event.inputs.RUSTDESK_PASSWORD }}"

      - name: Capture Screenshot
        run: |
          sleep 20
          screencapture -x /tmp/rustdesk-id.png

      - name: Upload Screenshot
        run: |
          IMAGE_URL=$(curl -s \
            -F "reqtype=fileupload" \
            -F "fileToUpload=@/tmp/rustdesk-id.png" \
            https://catbox.moe/user/api.php)

          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

      - name: Upload Artifact Backup
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-id
          path: /tmp/rustdesk-id.png
          retention-days: 1

      - name: Connection Info
        run: |
          echo "=============================="
          echo "RustDesk Cloud PC Ready"
          echo "Screenshot:"
          echo "${{ env.IMAGE_URL }}"
          echo "Password:"
          echo "${{ github.event.inputs.RUSTDESK_PASSWORD }}"
          echo "=============================="

          while true
          do
            sleep 3600
          done
```
