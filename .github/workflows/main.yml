name: "Cloud PC Setup (Windows / macOS)"

on:
  workflow_dispatch:
    inputs:
      os_choice:
        description: "Select the Operating System to deploy"
        type: choice
        options:
          - Windows
          - macOS
        required: true
        default: Windows
      CODE:
        description: "[Windows] Full headless CRD command (CMD version)"
        required: false
        default: ""
      PIN:
        description: "[Windows] CRD PIN (6+ digits)"
        required: false
        default: "123456"
      RUSTDESK_PASSWORD:
        description: "Custom RustDesk password"
        required: false
        default: "password123"

concurrency:
  group: cloud-pc-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  # ==========================================
  # WINDOWS JOB
  # ==========================================
  windows-crd-setup:
    name: "🚀 Windows 2022 CRD & RustDesk"
    if: github.event.inputs.os_choice == 'Windows'
    runs-on: windows-2022

    env:
      RAW_CODE: ${{ github.event.inputs.CODE }}
      PIN_INPUT: ${{ github.event.inputs.PIN }}
      RD_PASS: ${{ github.event.inputs.RUSTDESK_PASSWORD }}

    defaults:
      run:
        shell: pwsh

    steps:
      - name: "🛑 Verify Inputs"
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RAW_CODE)) {
            Write-Error "❌ Missing CRD Code!"
            exit 1
          }

      - name: "🔊 Enable Audio"
        run: |
          Set-Service -Name Audiosrv -StartupType Automatic
          Start-Service -Name Audiosrv

      - name: "🔧 Install CRD & RustDesk"
        run: |
          $userDownloads = Join-Path $env:USERPROFILE 'Downloads'
          if (-not (Test-Path $userDownloads)) { New-Item -ItemType Directory -Path $userDownloads | Out-Null }
          
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "$userDownloads\crdhost.msi" -UseBasicParsing
          Invoke-WebRequest -Uri "https://github.com/rustdesk/rustdesk/releases/download/1.3.7/rustdesk-1.3.7-x86_64.exe" -OutFile "$userDownloads\rustdesk.exe" -UseBasicParsing

          Start-Process -Wait -FilePath "msiexec.exe" -ArgumentList "/i `"$userDownloads\crdhost.msi`" /qn /norestart"

      - name: "🔑 Inject RustDesk Password (Windows)"
        run: |
          $userDownloads = Join-Path $env:USERPROFILE 'Downloads'
          Start-Process -FilePath "$userDownloads\rustdesk.exe" -ArgumentList "--password $env:RD_PASS"
          Start-Sleep -Seconds 5
          ./"$userDownloads\rustdesk.exe" --get-id

      - name: "🕵️‍♂️ Silent Install MostLogin"
        run: |
          $userDownloads = Join-Path $env:USERPROFILE 'Downloads'
          $mlInstaller = "$userDownloads\MostLogin-setup.exe"
          Invoke-WebRequest -Uri "https://downsoft.mostlogin.com/MostLogin-setup.exe" -OutFile $mlInstaller -UseBasicParsing
          Start-Process -FilePath $mlInstaller -ArgumentList "/S" -Wait
          
          $mlPath = "C:\Program Files (x86)\MostLogin\MostLogin.exe"
          if (Test-Path $mlPath) { Start-Process -FilePath $mlPath }

      - name: "🌟 Start Chrome Remote Desktop"
        run: |
          cmd.exe /c "$env:RAW_CODE --pin=$env:PIN_INPUT"

      - name: "⏳ Keep Alive"
        run: |
          Write-Host "✅ Windows PC Ready."
          while ($true) { Start-Sleep -Seconds 300 }

  # ==========================================
  # MACOS JOB
  # ==========================================
  macos-rustdesk-setup:
    name: "🍏 macOS RustDesk & CRD"
    if: github.event.inputs.os_choice == 'macOS'
    runs-on: macos-15

    steps:
      - name: "🔓 Create Admin"
        run: sudo sysadminctl -addUser macadmin -fullName "Mac Admin" -password "${{ github.event.inputs.RUSTDESK_PASSWORD }}" -admin

      - name: "🚫 System Prep"
        run: |
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0
          curl -L -o /Users/runner/wallpaper.jpg "https://images.unsplash.com/photo-1506744626753-dba37c2a9816?q=80&w=2560"
          osascript -e 'tell application "Finder" to set desktop picture to POSIX file "/Users/runner/wallpaper.jpg"'

      - name: "🖥️ Install Remote Tools"
        run: |
          brew install --cask rustdesk
          curl -L -o /tmp/crd.dmg https://dl.google.com/chrome-remote-desktop/chromeremotedesktop.dmg
          sudo hdiutil attach /tmp/crd.dmg -nobrowse
          PKG_PATH=$(find /Volumes/Chrome\ Remote\ Desktop* -name "*.pkg")
          sudo installer -pkg "$PKG_PATH" -target /
          sudo hdiutil detach /Volumes/Chrome\ Remote\ Desktop* -force

      - name: "🔑 Hard Injection RustDesk Password (macOS)"
        run: |
          # 1. Kill any auto-started instances
          sudo pkill -9 rustdesk || true
          
          # 2. Write password directly to the TOML config file
          sudo mkdir -p /etc/rustdesk
          echo "password = '${{ github.event.inputs.RUSTDESK_PASSWORD }}'" | sudo tee /etc/rustdesk/rustdesk.toml
          
          # 3. Ensure the service is installed to read the config
          sudo /Applications/RustDesk.app/Contents/MacOS/rustdesk --install-service || true
          
          # 4. Set it via CLI as a fallback
          sudo /Applications/RustDesk.app/Contents/MacOS/rustdesk --password "${{ github.event.inputs.RUSTDESK_PASSWORD }}"
          
          # 5. Launch UI
          open /Applications/RustDesk.app

      - name: "🕵️‍♂️ Install MostLogin"
        run: |
          curl -L -o /tmp/mostlogin.dmg "https://downsoft.mostlogin.com/MostLogin-x64-setup.dmg"
          MOUNT_ML=$(sudo hdiutil attach /tmp/mostlogin.dmg -nobrowse | grep -o '/Volumes/.*')
          sudo cp -R "$MOUNT_ML"/*.app /Applications/
          sudo hdiutil detach "$MOUNT_ML" -force

      - name: "🚀 Start & Capture RustDesk"
        run: |
          # Allow time for ID generation
          sleep 20
          /Applications/RustDesk.app/Contents/MacOS/rustdesk --get-id
          screencapture -x /tmp/rustdesk-id.png
          IMAGE_URL=$(curl -s -F "reqtype=fileupload" -F "fileToUpload=@/tmp/rustdesk-id.png" https://catbox.moe/user/api.php)
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

      - name: "⏳ Connection Window"
        run: |
          echo "📸 RustDesk ID Screenshot: ${{ env.IMAGE_URL }}"
          echo "🔑 Password: ${{ github.event.inputs.RUSTDESK_PASSWORD }}"
          while true; do sleep 3600; done
