- name: "🚀 Launch & Monitor RustDesk (3s Loop)"
        run: |
          # 1. Start the GUI
          open /Applications/RustDesk.app
          sleep 15
          
          # 2. Force your persistent password one last time
          /Applications/RustDesk.app/Contents/MacOS/rustdesk --password "${{ github.event.inputs.RUSTDESK_PASSWORD }}"
          
          echo "🔎 Monitoring ID and Password every 3 seconds..."
          echo "Press Ctrl+C to stop (though GitHub will keep it running)"
          
          # 3. Infinite loop to retrieve ID and Temp Password
          # We check both the System and User TOML files for the password
          while true; do
            RS_ID=$(/Applications/RustDesk.app/Contents/MacOS/rustdesk --get-id)
            
            # Try to find the password in the config file
            RS_PW=$(grep 'password =' ~/Library/Application\ Support/RustDesk/config/rustdesk.toml | cut -d'"' -f2)
            
            # If the user config is empty, check the system config
            if [ -z "$RS_PW" ]; then
              RS_PW=$(sudo grep 'password =' /etc/rustdesk/rustdesk.toml | cut -d'"' -f2)
            fi

            echo "----------------------------"
            echo "TIMESTAMP: $(date +%H:%M:%S)"
            echo "RUSTDESK ID: $RS_ID"
            echo "CURRENT PW : $RS_PW"
            echo "----------------------------"
            
            sleep 3
          done
