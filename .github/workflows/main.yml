name: "Cloud PC Setup (Windows / macOS)"

on:
  workflow_dispatch:
    inputs:
      os_choice:
        description: "Select the Operating System to deploy"
        type: choice
        options:
          - Windows
          - macOS
        required: true
        default: Windows
      
      windows_runner:
        description: "[Windows] Select Runner Model"
        type: choice
        options:
          - windows-latest
          - windows-2025
          - windows-2022
          - windows-2019
        required: false
        default: windows-2022
      
      macos_runner:
        description: "[macOS] Select Runner Model (12 & 13 Removed)"
        type: choice
        options:
          - macos-latest
          - macos-15
          - macos-14
        required: false
        default: macos-14
      
      CODE:
        description: "[Windows] Full headless CRD command"
        required: false
        default: ""
      
      PIN:
        description: "[Windows] CRD PIN (6+ digits)"
        required: false
        default: "123456"
      
      RUSTDESK_PASSWORD:
        description: "[macOS] Custom RustDesk password"
        required: false
        default: "password123"

jobs:
  # ==========================================
  # WINDOWS JOB
  # ==========================================
  windows-crd-setup:
    name: "🚀 Windows CRD Runner"
    if: github.event.inputs.os_choice == 'Windows'
    runs-on: ${{ github.event.inputs.windows_runner }}
    timeout-minutes: 360

    env:
      RAW_CODE: ${{ github.event.inputs.CODE }}
      PIN_INPUT: ${{ github.event.inputs.PIN }}

    steps:
      - name: "🔊 Enable Audio & Install CRD"
        shell: pwsh
        run: |
          # Configure Audio
          Set-Service -Name Audiosrv -StartupType Automatic
          Start-Service -Name Audiosrv -ErrorAction SilentlyContinue
          
          $userDownloads = Join-Path $env:USERPROFILE 'Downloads'
          if (-not (Test-Path $userDownloads)) { New-Item -ItemType Directory -Path $userDownloads }
          
          Write-Host "Downloading Chrome Remote Desktop..."
          Invoke-WebRequest -Uri "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile "$userDownloads\crdhost.msi"
          
          Write-Host "Installing CRD..."
          Start-Process -Wait -FilePath "msiexec.exe" -ArgumentList "/i `"$userDownloads\crdhost.msi`" /qn /norestart"
          Write-Host "✅ CRD Installed."

      - name: "🌟 Start Chrome Remote Desktop"
        shell: cmd
        run: |
          if "%RAW_CODE%"=="" (
            echo "❌ ERROR: Paste the CRD command in the CODE input!"
            exit 1
          )
          %RAW_CODE% --pin=%PIN_INPUT%

      - name: "⏳ Keep Runner Alive"
        shell: pwsh
        run: |
          while ($true) { Start-Sleep -Seconds 300 }

  # ==========================================
  # MACOS JOB
  # ==========================================
  macos-rustdesk-setup:
    name: "🍏 macOS Runner"
    if: github.event.inputs.os_choice == 'macOS'
    runs-on: ${{ github.event.inputs.macos_runner }}
    timeout-minutes: 360

    steps:
      - name: "🛡️ Security Bypass"
        run: |
          sudo spctl --master-disable
          sudo security authorizationdb write system.install.software allow
          sudo security authorizationdb write system.services.systemcomponents.install allow
          sudo security authorizationdb write com.google.ChromeRemoteDesktop.host.me2me allow
          sudo mkdir -p "/Library/Google/Chrome Remote Desktop"
          sudo chmod -R 777 "/Library/Google/Chrome Remote Desktop"

      - name: "🔓 Setup Admin & Disable Sleep"
        run: |
          sudo sysadminctl -addUser macadmin -fullName "Mac Admin" -password "${{ github.event.inputs.RUSTDESK_PASSWORD }}" -admin
          sudo pmset -a sleep 0 displaysleep 0 disksleep 0

      - name: "🦀 Install Remote Tools"
        run: |
          brew install --cask --no-quarantine rustdesk betterdisplay
          curl -L -o /tmp/crd.dmg https://dl.google.com/chrome-remote-desktop/chromeremotedesktop.dmg
          sudo hdiutil attach /tmp/crd.dmg -nobrowse
          sudo installer -pkg /Volumes/Chrome\ Remote\ Desktop*/*.pkg -target /
          sudo hdiutil detach /Volumes/Chrome\ Remote\ Desktop* -force

      - name: "🚀 Force Launch CRD"
        run: |
          sudo launchctl load -w /Library/LaunchDaemons/com.google.chrome.remote_desktop.plist || true
          sudo launchctl load -w /Library/LaunchAgents/com.google.chrome.remote_desktop.plist || true
          CRD_HOST="/Library/PrivilegedHelperTools/com.google.ChromeRemoteDesktop.me2me_host"
          if [ -f "$CRD_HOST" ]; then sudo chmod +x "$CRD_HOST"; fi

      - name: "🔓 Inject TCC Permissions"
        run: |
          TCC_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          sudo sqlite3 "$TCC_DB" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceScreenCapture', 'com.carriez.rustdesk', 0, 2, 4, 1, 0);"
          sudo sqlite3 "$TCC_DB" "INSERT OR REPLACE INTO access (service, client, client_type, auth_value, auth_reason, auth_version, flags) VALUES ('kTCCServiceAccessibility', 'com.carriez.rustdesk', 0, 2, 4, 1, 0);"

      - name: "🚀 Start RustDesk"
        run: |
          open /Applications/RustDesk.app
          sleep 10
          sudo /Applications/RustDesk.app/Contents/MacOS/rustdesk --password "${{ github.event.inputs.RUSTDESK_PASSWORD }}"
          sudo caffeinate -dimsu &

      - name: "📸 Final Status"
        run: |
          sleep 15
          screencapture -x /tmp/id.png
          curl -s -F "reqtype=fileupload" -F "fileToUpload=@/tmp/id.png" https://catbox.moe/user/api.php
          echo "🚀 STATUS: READY!"
          while true; do sleep 3600; done
